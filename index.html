<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantaForma | Links</title>
    <!-- アイコンライブラリ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #ffcc00; /* ロゴの雰囲気に合わせたアクセント */
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        /* ロゴ画像の設定 */
        .logo {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 13px;
            color: var(--text-sub);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .link-container {
            width: 100%;
            max-width: 420px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .link-card i {
            font-size: 22px;
            margin-right: 20px;
            color: var(--accent-color);
            width: 28px;
            text-align: center;
        }

        .link-text {
            flex-grow: 1;
        }

        .link-text span {
            display: block;
            font-size: 16px;
            font-weight: 600;
        }

        .link-text small {
            display: block;
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .arrow {
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="profile">
        <!-- ロゴ画像 -->
        <img src="PlantaForma_logo.jpg" alt="PlantaForma Logo" class="logo">
        <p class="tagline">3D Design & Botanical Lab</p>
    </div>

    <div class="link-container">
        <!-- MakerWorld -->
        <a href="https://makerworld.com/ja/@PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-cube"></i>
            <div class="link-text">
                <span>MakerWorld</span>
                <small>Get 3D Models (HEX-SYSTEM, etc.)</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- Creema -->
        <a href="https://www.creema.jp/c/PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-store"></i>
            <div class="link-text">
                <span>Creema Shop</span>
                <small>Handmade Low-Poly Bonsai & More</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- YouTube -->
        <a href="https://youtube.com/@PlantaForma" class="link-card" target="_blank">
            <i class="fa-brands fa-youtube"></i>
            <div class="link-text">
                <span>YouTube</span>
                <small>3D Print Vlogs & Reviews</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- X (Twitter) -->
        <a href="https://x.com/PlantaForma" class="link-card" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
            <div class="link-text">
                <span>X (Twitter)</span>
                <small>Latest Updates & Works</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
    </div>

</body>
</html>
