<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantaForma | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #050605;
            --card-bg: rgba(255, 255, 255, 0.02);
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-sub: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px; /* 余計な隙間を削除 */
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- ロゴのアニメーション修正 --- */
        .profile {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            height: 120px; /* ヘッダーの高さを固定 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 100%;
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.2));
            /* 画像単体で動かすことでレイアウト崩れを防ぐ */
            animation: logoFixedMove 1.1s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        @keyframes logoFixedMove {
            0% {
                transform: translateY(35vh) scale(1.4);
                opacity: 0;
                filter: blur(10px);
            }
            30% {
                opacity: 1;
                filter: blur(0px);
            }
            70% {
                transform: translateY(35vh) scale(1.4);
            }
            100% {
                transform: translateY(0) scale(1); /* 確実に0の位置に固定 */
            }
        }

        .tagline {
            font-size: 11px;
            color: var(--text-sub);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 0.4s ease 1.1s forwards;
        }

        /* --- リンクカード --- */
        .link-container {
            width: 100%;
            max-width: 400px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: cardReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* カードの登場タイミング */
        .link-card:nth-child(1) { animation-delay: 1.2s; }
        .link-card:nth-child(2) { animation-delay: 1.3s; }
        .link-card:nth-child(3) { animation-delay: 1.4s; }
        .link-card:nth-child(4) { animation-delay: 1.5s; }

        @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ホバー */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
            transform: scale(1.02);
        }
        .link-card i { font-size: 18px; margin-right: 20px; color: #555; width: 24px; text-align: center; }
        .link-card:hover i { color: var(--accent-color); filter: drop-shadow(0 0 5px var(--accent-color)); }
        .link-text span { display: block; font-size: 15px; font-weight: 600; }
        .link-text small { display: block; font-size: 10px; color: var(--text-sub); margin-top: 3px; }
        .arrow { font-size: 12px; color: #222; margin-left: auto; }
    </style>
</head>
<body>

    <div class="profile">
        <img src="PlantaForma_logo.jpg" alt="PlantaForma Logo" class="logo">
        <p class="tagline">3D Design & Botanical Lab</p>
    </div>

    <div class="link-container">
        <a href="https://x.com/Afk_Ty" class="link-card" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
            <div class="link-text"><span>X (Twitter)</span><small>@Afk_Ty | Latest Updates</small></div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <a href="https://youtube.com/@snob_PF" class="link-card" target="_blank">
            <i class="fa-brands fa-youtube"></i>
            <div class="link-text"><span>YouTube</span><small>@snob_PF | Vlogs & Reviews</small></div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <a href="https://makerworld.com/ja/@PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-cube"></i>
            <div class="link-text"><span>MakerWorld</span><small>Get 3D Models</small></div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
        <a href="https://www.creema.jp/c/PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-store"></i>
            <div class="link-text"><span>Creema Shop</span><small>Handmade Works</small></div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
    </div>

</body>
</html>
