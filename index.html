<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantaForma | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #050605;
            --card-bg: rgba(255, 255, 255, 0.02);
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-sub: #777777;
            --header-spacing: 80px; /* 上部の余白をプロ仕様に設定 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--header-spacing) 20px 100px; /* 上にしっかり、下にも余韻を */
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* --- ヘッダー・ロゴエリア --- */
        .profile {
            text-align: center;
            margin-bottom: 80px; /* ロゴエリアとリンクの間の余白を拡大 */
            width: 100%;
            height: 100px; /* 固定の高さを確保 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 100%;
            max-width: 220px; /* 少し小さくして繊細さを演出 */
            height: auto;
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
            /* アニメーション：中央から上端（paddingで指定した位置）へ */
            animation: logoEntryPoint 1.2s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        @keyframes logoEntryPoint {
            0% {
                transform: translateY(30vh) scale(1.3);
                opacity: 0;
                filter: blur(15px);
            }
            35% {
                opacity: 1;
                filter: blur(0px);
            }
            70% {
                transform: translateY(30vh) scale(1.3);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        .tagline {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 0.4em; /* 文字間をさらに広げて贅沢に */
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 25px; /* ロゴとの間隔を広げる */
            opacity: 0;
            animation: fadeIn 0.6s ease 1.3s forwards;
        }

        /* --- リンクカードエリア --- */
        .link-container {
            width: 100%;
            max-width: 380px; /* カード幅を少し絞って垂直ラインを強調 */
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2px; /* ほぼ直角にしてモダン・シャープに */
            padding: 22px 26px;
            margin-bottom: 20px; /* カード同士の間隔を少し広げる */
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: cardReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 順次登場 */
        .link-card:nth-child(1) { animation-delay: 1.5s; }
        .link-card:nth-child(2) { animation-delay: 1.6s; }
        .link-card:nth-child(3) { animation-delay: 1.7s; }
        .link-card:nth-child(4) { animation-delay: 1.8s; }

        @keyframes cardReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ホバー時の洗練された動き */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--accent-color);
            transform: translateY(-2px); /* 拡大ではなく「浮上」 */
        }

        .link-card i {
            font-size: 18px;
            margin-right: 24px;
            color: #444;
            width: 20px;
            text-align: center;
            transition: 0.4s;
        }

        .link-card:hover i {
            color: var(--accent-color);
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .link-text span {
            display: block;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .link-text small {
            display: block;
            font-size: 9px;
            color: var(--text-sub);
            margin-top: 4px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .arrow {
            font-size: 10px;
            color: #222;
            margin-left: auto;
            transition: 0.4s;
        }

        .link-card:hover .arrow {
            color: var(--accent-color);
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <div class="profile">
        <img src="PlantaForma_logo.jpg" alt="PlantaForma Logo" class="logo">
        <p class="tagline">3D Design & Botanical Lab</p>
    </div>

    <div class="link-container">
        <!-- X -->
        <a href="https://x.com/Afk_Ty" class="link-card" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
            <div class="link-text">
                <span>X (Twitter)</span>
                <small>Latest Updates</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- YouTube -->
        <a href="https://youtube.com/@snob_PF" class="link-card" target="_blank">
            <i class="fa-brands fa-youtube"></i>
            <div class="link-text">
                <span>YouTube</span>
                <small>Vlogs & Reviews</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- MakerWorld -->
        <a href="https://makerworld.com/ja/@PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-cube"></i>
            <div class="link-text">
                <span>MakerWorld</span>
                <small>3D Data Store</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>

        <!-- Creema -->
        <a href="https://www.creema.jp/c/PlantaForma" class="link-card" target="_blank">
            <i class="fa-solid fa-store"></i>
            <div class="link-text">
                <span>Creema Shop</span>
                <small>Product Sales</small>
            </div>
            <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
        </a>
    </div>

</body>
</html>
